cards:
  - "Use a concrete image (streetlight, kettle, window rain, open laptop)."
  - "Start mid-thought, like you already knew the listener was there."
  - "One playful parenthetical, then drop it."
  - "Sound slightly conspiratorial, like a secret for night people."
  - "Name the feeling before the track — not the BPM."
  - "Borrow one half-remembered lyric vibe, don't quote real songs."
  - "Make it feel like 2 a.m. even if it isn't."
  - "Address the city as if it can hear you."
  - "One dry joke, no laugh track energy."
  - "Treat the next track like a letter arriving late."
  - "Whisper-close intimacy for one sentence, then open up."
  - "Mention coffee, tea, or something warm without being basic."
  - "Reference the mood of the set without saying the word mood."
  - "Sound amused at the universe for two beats."
  - "End on a soft cliffhanger into the music."
