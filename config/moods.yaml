# Station moods → genre packs (ids must match config/genres/*.yaml)
default: late_night

moods:
  late_night:
    label: Late Night
    blurb: Soft, atmospheric, after-hours
    genres:
      - rnb
      - jazz
      - blues
      - indie
      - classical
      - folk

  chill:
    label: Chill
    blurb: Unhurried, warm, easy listening
    genres:
      - jazz
      - rnb
      - folk
      - classical
      - reggae
      - indie
      - blues

  upbeat:
    label: Upbeat
    blurb: Energy, dance floors, road-trip volume
    genres:
      - pop
      - electronic
      - latin
      - rock
      - hiphop

  dark:
    label: Dark Energy
    blurb: Grit, neon, late drive intensity
    genres:
      - metal
      - melodic_progressive_metal
      - hiphop
      - electronic
      - rock

  organic:
    label: Organic
    blurb: Acoustic, live-room, human touch
    genres:
      - country
      - folk
      - blues
      - jazz
      - gospel
      - indie

  electronic:
    label: Electronic
    blurb: Synths, pulses, machine soul
    genres:
      - electronic
      - pop

  pop:
    label: Pop
    blurb: Hooks, gloss, radio candy
    genres:
      - pop
      - indie
      - rnb
      - latin

  rock:
    label: Rock
    blurb: Guitars, drive, live-band power
    genres:
      - rock
      - indie
      - metal
      - melodic_progressive_metal

  hiphop:
    label: Hip-Hop
    blurb: Bars, 808s, head-nod nights
    genres:
      - hiphop
      - rnb
      - pop

  classical:
    label: Classical
    blurb: Orchestra, piano, concert hall calm
    genres:
      - classical
      - folk
      - gospel

  eclectic:
    label: Eclectic
    blurb: Everything on the station — full mix
    genres: [all]
